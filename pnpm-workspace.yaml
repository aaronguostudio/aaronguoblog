packages:
  - .

autoInstallPeers: true

# Nitro resolves the Resvg optional binary while packaging Vercel functions.
# Keep both the host libc and musl variants available in the install graph.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - musl

overrides:
  better-sqlite3: ^12.6.2

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - better-sqlite3
  - esbuild
  - sharp
  - unrs-resolver
  - vue-demi
