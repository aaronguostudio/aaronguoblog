name: Radar

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Optional Radar topic slug
        required: false
        type: string
      cadence:
        description: Radar cadence to run when no topic is provided
        required: false
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - manual

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.2.2
          run_install: false

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: CI=true pnpm install --frozen-lockfile

      - name: Checkout last30days
        uses: actions/checkout@v4
        with:
          repository: mvanhorn/last30days-skill
          ref: 122158415ae421da83e739f2668032f6bc78d39c
          path: .last30days-skill

      - name: Resolve last30days CLI
        id: last30days
        run: |
          for candidate in \
            "$GITHUB_WORKSPACE/.last30days-skill/skills/last30days/scripts/last30days.py" \
            "$GITHUB_WORKSPACE/.last30days-skill/last30days/scripts/last30days.py" \
            "$GITHUB_WORKSPACE/.last30days-skill/scripts/last30days.py"; do
            if [ -f "$candidate" ]; then
              echo "cli=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "last30days.py was not found in the checked-out skill repo" >&2
          find "$GITHUB_WORKSPACE/.last30days-skill" -maxdepth 5 -type f -name last30days.py >&2
          exit 1

      - name: Migrate Radar schema
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: pnpm radar:migrate

      - name: Run Radar
        env:
          RADAR_TOPIC: ${{ github.event.inputs.topic || '' }}
          RADAR_CADENCE: ${{ github.event.inputs.cadence || 'daily' }}
          LAST30DAYS_CLI: ${{ steps.last30days.outputs.cli }}
          LAST30DAYS_PYTHON: python3.12
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          CT0: ${{ secrets.CT0 }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          TRUTHSOCIAL_TOKEN: ${{ secrets.TRUTHSOCIAL_TOKEN }}
        run: |
          if [ -n "$RADAR_TOPIC" ]; then
            pnpm radar:run --topic "$RADAR_TOPIC"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            pnpm radar:run --cadence "$RADAR_CADENCE"
          else
            echo "Unsupported Radar event: $GITHUB_EVENT_NAME" >&2
            exit 1
          fi

      - name: Export static Radar snapshot
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RADAR_ALLOW_LOCAL_RANKING: ${{ secrets.RADAR_ALLOW_LOCAL_RANKING }}
        run: |
          if [ "$RADAR_ALLOW_LOCAL_RANKING" = "1" ]; then
            pnpm radar:export --allow-local-ranking
          else
            pnpm radar:export
          fi

      - name: Verify static build
        run: pnpm run generate

      - name: Commit static Radar snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/radar

          if git diff --cached --quiet; then
            echo "Radar snapshot unchanged; nothing to commit."
            exit 0
          fi

          git commit -m "chore(radar): update signal snapshot $(date -u +%F)"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload raw Radar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-raw
          path: .data/radar/raw
          if-no-files-found: ignore
